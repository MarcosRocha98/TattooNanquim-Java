<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Nanquim | Estúdio de Tatuagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); padding: 1rem 2rem; z-index: 1000; border-bottom: 1px solid #222; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; text-decoration: none; color: white; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: white; text-decoration: none; transition: opacity 0.3s; }
        .nav-links a:hover { opacity: 0.6; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.pexels.com/photos/259834/pexels-photo-259834.jpeg'); background-size: cover; background-position: center; }
        .hero h1 { font-size: 4rem; margin-bottom: 1rem; }
        .btn { display: inline-block; background: white; color: black; padding: 12px 32px; text-decoration: none; border-radius: 30px; font-weight: 600; margin-top: 2rem; transition: transform 0.3s; border: none; cursor: pointer; }
        .btn:hover { transform: scale(1.05); }
        .btn-outline { background: transparent; border: 2px solid white; color: white; }
        .btn-outline:hover { background: white; color: black; }
        section { padding: 80px 0; border-bottom: 1px solid #222; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        h2 { font-size: 2.5rem; margin-bottom: 3rem; border-left: 4px solid white; padding-left: 20px; }
        .artists-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .artist-card { background: #111; border-radius: 16px; padding: 30px; text-align: center; border: 1px solid #222; transition: transform 0.3s; }
        .artist-card:hover { transform: translateY(-5px); border-color: #444; }
        .artist-icon { font-size: 3rem; margin-bottom: 1rem; }
        .artist-card h3 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .artist-card p { color: #888; margin: 10px 0; }
        .booking-form { background: #111; border-radius: 24px; padding: 40px; border: 1px solid #222; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Inter', sans-serif; }
        .calendar-simple { background: #111; border-radius: 16px; padding: 20px; margin-bottom: 30px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #1a1a1a; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .calendar-day:hover:not(.disabled) { background: #333; }
        .calendar-day.selected { background: white; color: black; }
        .calendar-day.disabled { opacity: 0.3; cursor: not-allowed; }
        .time-slots { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .time-slot { background: #1a1a1a; border: 1px solid #333; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: all 0.3s; }
        .time-slot.selected { background: white; color: black; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background: #0f3b1f; border: 1px solid #1a5c32; color: #a5f0c0; }
        .alert-error { background: #3b1f1f; border: 1px solid #5c3232; color: #f0a5a5; }
        .admin-link { position: fixed; bottom: 20px; left: 20px; background: #222; color: white; padding: 8px 16px; border-radius: 30px; text-decoration: none; font-size: 12px; z-index: 99; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: white; color: black; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 99; text-decoration: none; }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .nav-links { display: none; } .booking-form { padding: 20px; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">⚡ CASA NANQUIM</a>
            <ul class="nav-links">
                <li><a href="#home">Início</a></li>
                <li><a href="#artistas">Artistas</a></li>
                <li><a href="#agendamento">Agendar Tattoo</a></li>
                <li><a href="alugar-espaco.html">🏪 Alugar Espaço</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div><h1>CASA NANQUIM</h1><p>Transformando ideias em arte na pele</p><a href="#agendamento" class="btn">Agendar Tattoo</a></div>
    </section>

    <div class="container">
        <section id="artistas"><h2>Nossos Artistas</h2><div class="artists-grid" id="artistsGrid"><p style="text-align:center;">Carregando artistas...</p></div></section>
        <section id="agendamento">
            <h2>Agende sua Tattoo</h2>
            <div class="booking-form">
                <div id="alertMessage"></div>
                <div class="calendar-simple">
                    <div class="calendar-header">
                        <button class="btn-outline" id="prevMonth" style="padding: 5px 15px;">←</button>
                        <h3 id="monthYear"></h3>
                        <button class="btn-outline" id="nextMonth" style="padding: 5px 15px;">→</button>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                </div>
                <div class="form-group"><label>Escolha o Artista</label><select id="artistSelect"><option value="">Selecione...</option></select></div>
                <div class="form-group"><label>Horários Disponíveis</label><div class="time-slots" id="timeSlots"></div></div>
                <form id="bookingForm">
                    <div class="form-group"><label>Seu Nome *</label><input type="text" id="nome" required></div>
                    <div class="form-group"><label>WhatsApp *</label><input type="tel" id="whatsapp" required></div>
                    <div class="form-group"><label>Descrição da Tatuagem</label><textarea id="descricao" rows="3"></textarea></div>
                    <div class="form-group"><label>Local do Corpo</label><input type="text" id="local"></div>
                    <button type="submit" class="btn" style="width:100%">Confirmar Agendamento</button>
                </form>
            </div>
        </section>
    </div>

    <a href="admin.html" class="admin-link">🔧 Admin</a>
    <a href="https://wa.me/5511999999999" class="whatsapp-float" target="_blank">💬</a>

    <script>
        const API_URL = 'http://localhost:8888/CasaNanquim/api';
        let artistas = [], horariosConfig = [], diasFechados = [], selectedDate = null, selectedTime = null, currentDate = new Date();

        async function carregarDados() {
            try {
                const artistasResp = await fetch(`${API_URL}/artistas`);
                artistas = await artistasResp.json();
                const configResp = await fetch(`${API_URL}/configuracoes`);
                const config = await configResp.json();
                horariosConfig = config.horarios;
                diasFechados = config.diasFechados;
                renderArtistas();
                renderCalendar();
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('artistsGrid').innerHTML = '<p style="text-align:center;color:#ff4444;">Erro ao conectar com o servidor</p>';
            }
        }

        function renderArtistas() {
            const grid = document.getElementById('artistsGrid');
            if (!artistas || artistas.length === 0) { grid.innerHTML = '<p style="text-align:center;">Nenhum artista cadastrado.</p>'; return; }
            grid.innerHTML = artistas.map(artista => `<div class="artist-card"><div class="artist-icon">🎨</div><h3>${artista.nome}</h3><p>${artista.estilo || 'Tatuador'}</p><div class="artist-instagram">${artista.instagram || '@instagram'}</div></div>`).join('');
            const select = document.getElementById('artistSelect');
            select.innerHTML = '<option value="">Selecione um artista...</option>' + artistas.map(a => `<option value="${a.id}">${a.nome} - ${a.estilo || 'Tatuador'}</option>`).join('');
        }

        function renderCalendar() {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('monthYear').innerText = `${new Date(year, month).toLocaleString('default', { month: 'long' })} ${year}`;
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            const calendar = document.getElementById('calendarDays');
            calendar.innerHTML = '';
            const weekDays = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];
            weekDays.forEach(day => { const dayDiv = document.createElement('div'); dayDiv.style.textAlign = 'center'; dayDiv.style.color = '#888'; dayDiv.innerText = day; calendar.appendChild(dayDiv); });
            for (let i = 0; i < firstDay; i++) calendar.innerHTML += '<div></div>';
            const today = new Date(); today.setHours(0,0,0,0);
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day), dayName = date.toLocaleDateString('pt-BR', { weekday: 'long' }).toLowerCase();
                const isClosed = diasFechados && diasFechados.some(d => dayName.includes(d.toLowerCase()));
                const isPast = date < today;
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                if (isClosed || isPast) dayDiv.classList.add('disabled');
                dayDiv.innerText = day;
                if (!isClosed && !isPast) dayDiv.addEventListener('click', () => { document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected')); dayDiv.classList.add('selected'); selectedDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; carregarHorariosDisponiveis(); });
                calendar.appendChild(dayDiv);
            }
        }

        async function carregarHorariosDisponiveis() {
            const artistaId = document.getElementById('artistSelect').value;
            if (!selectedDate || !artistaId) return;
            try {
                const response = await fetch(`${API_URL}/horarios-disponiveis?data=${selectedDate}&artista=${artistaId}`);
                const data = await response.json();
                const container = document.getElementById('timeSlots');
                if (data.horarios && data.horarios.length > 0) {
                    const agora = new Date();
                    const horaAtual = agora.getHours();
                    const minutoAtual = agora.getMinutes();
                    const hoje = new Date().toISOString().split('T')[0];
                    const isHoje = (selectedDate === hoje);
                    let horariosFiltrados = data.horarios;
                    if (isHoje) {
                        horariosFiltrados = data.horarios.filter(horario => {
                            const [hora, minuto] = horario.split(':').map(Number);
                            if (hora > horaAtual) return true;
                            if (hora === horaAtual && minuto > minutoAtual) return true;
                            return false;
                        });
                    }
                    if (horariosFiltrados.length > 0) {
                        container.innerHTML = horariosFiltrados.map(time => `<div class="time-slot" data-time="${time}">${time}</div>`).join('');
                        document.querySelectorAll('.time-slot').forEach(slot => { slot.addEventListener('click', () => { document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected')); slot.classList.add('selected'); selectedTime = slot.dataset.time; }); });
                    } else { container.innerHTML = '<p style="color:#888;">Sem horários disponíveis para hoje</p>'; }
                } else { container.innerHTML = '<p style="color:#888;">Sem horários disponíveis nesta data</p>'; }
            } catch (error) { console.error('Erro ao carregar horários:', error); }
        }

        function showAlert(message, type) { const alertDiv = document.getElementById('alertMessage'); alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`; setTimeout(() => alertDiv.innerHTML = '', 3000); }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value, whatsapp = document.getElementById('whatsapp').value, descricao = document.getElementById('descricao').value, local = document.getElementById('local').value, artistaId = document.getElementById('artistSelect').value;
            if (!nome || !whatsapp || !artistaId || !selectedDate || !selectedTime) { showAlert('Preencha todos os campos e selecione data, artista e horário!', 'error'); return; }
            const agendamento = { nome, whatsapp, artista_id: parseInt(artistaId), data: selectedDate, horario: selectedTime, descricao, local };
            try {
                const response = await fetch(`${API_URL}/agendar`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(agendamento) });
                const result = await response.json();
                if (result.success) {
                    showAlert('✅ Agendamento realizado com sucesso!', 'success');
                    document.getElementById('bookingForm').reset();
                    selectedDate = null; selectedTime = null;
                    document.querySelectorAll('.calendar-day.selected').forEach(d => d.classList.remove('selected'));
                    document.querySelectorAll('.time-slot.selected').forEach(t => t.classList.remove('selected'));
                    document.getElementById('timeSlots').innerHTML = '';
                } else { showAlert('❌ Erro: ' + (result.error || 'Tente novamente'), 'error'); }
            } catch (error) { showAlert('❌ Erro ao conectar com o servidor', 'error'); }
        });

        document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });
        document.getElementById('artistSelect').addEventListener('change', () => { carregarHorariosDisponiveis(); });

        carregarDados();
    </script>
</body>
</html>
