<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alugar Espaço | Casa Nanquim</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .header { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .header h1 { font-size: 2rem; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        .card { background: #111; border-radius: 16px; padding: 30px; border: 1px solid #222; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; }
        .form-group input:disabled, .form-group select:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn { background: white; color: black; padding: 12px 32px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { transform: scale(1.02); }
        .precos { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .preco-card { background: #1a1a1a; padding: 15px; border-radius: 12px; flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; min-width: 120px; }
        .preco-card.selected { border-color: white; background: #222; }
        .preco-card h3 { color: #ff8800; }
        .preco-card p { font-size: 1.5rem; font-weight: bold; }
        .preco-card small { font-size: 0.8rem; color: #888; }
        .voltar { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background: #0f3b1f; color: #a5f0c0; }
        .alert-error { background: #3b1f1f; color: #f0a5a5; }
        .info-text { font-size: 12px; color: #888; margin-top: 5px; }
        .total-destaque { font-size: 1.5rem; font-weight: bold; color: #ff8800; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ CASA NANQUIM</h1>
        <p>Aluguel de Espaço para Tatuadores</p>
    </div>
    <div class="container">
        <div class="card">
            <h2>📅 Alugue nosso espaço</h2>
            <p style="color:#888; margin-bottom:20px;">Equipamento profissional incluso | Ambiente climatizado | Localização central</p>
            <div id="alertMessage"></div>
            
            <h3>💰 Escolha o período</h3>
            <div class="precos" id="precosContainer"></div>
            
            <div class="form-group">
                <label>📅 Data da reserva</label>
                <input type="date" id="dataReserva" min="">
            </div>
            
            <div class="form-group">
                <label>⏰ Horário de início</label>
                <select id="horarioInicio">
                    <option value="">Selecione...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>⏰ Horário de fim</label>
                <select id="horarioFim">
                    <option value="">Será preenchido automaticamente</option>
                </select>
                <p class="info-text" id="infoHorarioFim"></p>
            </div>
            
            <div class="form-group">
                <label>👤 Seu nome</label>
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
            
            <div class="form-group">
                <label>📱 WhatsApp</label>
                <input type="tel" id="whatsapp" placeholder="(11) 99999-9999" required>
            </div>
            
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            
            <div class="form-group">
                <label>📸 Instagram</label>
                <input type="text" id="instagram" placeholder="@seuinstagram">
            </div>
            
            <div class="form-group">
                <label>🎨 Especialidade</label>
                <input type="text" id="especialidade" placeholder="Ex: Realismo, Aquarela...">
            </div>
            
            <div class="form-group">
                <label>💬 Observações</label>
                <textarea id="observacao" rows="3" placeholder="Alguma informação adicional?"></textarea>
            </div>
            
            <div class="form-group">
                <label>💰 Valor total</label>
                <input type="text" id="valorTotal" readonly style="background:#333; font-size:1.5rem; font-weight:bold; color:#ff8800; text-align:center;">
            </div>
            
            <button class="btn" id="btnReservar">📝 Solicitar Reserva</button>
            <a href="index.html" class="voltar">← Voltar para o site</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8888/CasaNanquim/api';
        
        // Preços
        const VALOR_2_HORAS = 80;      // R$ 80 por 2 horas
        const VALOR_MEIO_PERIODO = 150; // R$ 150 por 4 horas
        const VALOR_DIA_INTEIRO = 250;   // R$ 250 por 8 horas
        
        let selectedPreco = null;
        let horariosDisponiveis = [];
        
        // Configurar data mínima (hoje)
        function configurarDataMinima() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            const dataMinima = `${ano}-${mes}-${dia}`;
            document.getElementById('dataReserva').setAttribute('min', dataMinima);
        }
        
        // Verificar se a data é hoje
        function isDataHoje(data) {
            const hoje = new Date();
            const anoHoje = hoje.getFullYear();
            const mesHoje = String(hoje.getMonth() + 1).padStart(2, '0');
            const diaHoje = String(hoje.getDate()).padStart(2, '0');
            const dataHoje = `${anoHoje}-${mesHoje}-${diaHoje}`;
            return data === dataHoje;
        }
        
        // Verificar se horário já passou (apenas para hoje)
        function isHorarioPassado(horario) {
            const agora = new Date();
            const horaAtual = agora.getHours();
            const minutoAtual = agora.getMinutes();
            const [hora, minuto] = horario.split(':').map(Number);
            
            if (hora < horaAtual) return true;
            if (hora === horaAtual && minuto <= minutoAtual) return true;
            return false;
        }
        
        function carregarPrecos() {
            const container = document.getElementById('precosContainer');
            container.innerHTML = `
                <div class="preco-card" data-tipo="2_HORAS" data-valor="${VALOR_2_HORAS}" data-duracao="2">
                    <h3>⚡ 2 Horas</h3>
                    <p>R$ ${VALOR_2_HORAS}</p>
                    <small>Perfeito para sessões rápidas</small>
                </div>
                <div class="preco-card" data-tipo="MEIO_PERIODO" data-valor="${VALOR_MEIO_PERIODO}" data-duracao="4">
                    <h3>📆 Meio período</h3>
                    <p>R$ ${VALOR_MEIO_PERIODO}</p>
                    <small>4 horas</small>
                </div>
                <div class="preco-card" data-tipo="DIA_INTEIRO" data-valor="${VALOR_DIA_INTEIRO}" data-duracao="8">
                    <h3>📆 Dia inteiro</h3>
                    <p>R$ ${VALOR_DIA_INTEIRO}</p>
                    <small>8 horas</small>
                </div>
            `;
            
            document.querySelectorAll('.preco-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.preco-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    
                    selectedPreco = {
                        tipo: card.dataset.tipo,
                        valorBase: parseFloat(card.dataset.valor),
                        duracao: parseInt(card.dataset.duracao)
                    };
                    
                    configurarSelectHorarioFim();
                    
                    const inicio = document.getElementById('horarioInicio').value;
                    if (inicio) {
                        calcularHorarioFimAutomatico();
                    }
                    
                    calcularValorTotal();
                });
            });
        }
        
        function configurarSelectHorarioFim() {
            const selectFim = document.getElementById('horarioFim');
            selectFim.disabled = true;
            document.getElementById('infoHorarioFim').innerHTML = 'Horário de fim será calculado automaticamente após selecionar o início';
            selectFim.innerHTML = '<option value="">Será preenchido automaticamente</option>';
        }
        
        function calcularValorTotal() {
            if (!selectedPreco) {
                document.getElementById('valorTotal').value = 'Selecione um período';
                return;
            }
            document.getElementById('valorTotal').value = `R$ ${selectedPreco.valorBase.toFixed(2)}`;
        }
        
        function calcularHorarioFimAutomatico() {
            const inicio = document.getElementById('horarioInicio').value;
            if (!inicio || !selectedPreco) return;
            
            const [horaInicio, minutoInicio] = inicio.split(':').map(Number);
            let horaFim = horaInicio + selectedPreco.duracao;
            let minutoFim = minutoInicio;
            
            if (horaFim > 20) {
                alert('Este horário ultrapassa o limite de funcionamento (20:00). Escolha um horário mais cedo.');
                document.getElementById('horarioInicio').value = '';
                return;
            }
            
            const horarioFimStr = `${String(horaFim).padStart(2, '0')}:${String(minutoFim).padStart(2, '0')}`;
            
            if (!horariosDisponiveis.includes(horarioFimStr)) {
                alert(`O horário de fim (${horarioFimStr}) não está disponível. Escolha outro horário de início.`);
                document.getElementById('horarioInicio').value = '';
                return;
            }
            
            const selectFim = document.getElementById('horarioFim');
            selectFim.innerHTML = `<option value="${horarioFimStr}">${horarioFimStr}</option>`;
            selectFim.disabled = false;
            selectFim.value = horarioFimStr;
            document.getElementById('infoHorarioFim').innerHTML = `Horário de fim calculado automaticamente (+${selectedPreco.duracao}h)`;
            
            calcularValorTotal();
        }
        
        async function carregarHorariosDisponiveis() {
            const data = document.getElementById('dataReserva').value;
            if (!data) return;
            
            // Verifica se a data é anterior a hoje
            const hoje = new Date();
            const anoHoje = hoje.getFullYear();
            const mesHoje = String(hoje.getMonth() + 1).padStart(2, '0');
            const diaHoje = String(hoje.getDate()).padStart(2, '0');
            const dataHoje = `${anoHoje}-${mesHoje}-${diaHoje}`;
            
            if (data < dataHoje) {
                alert('Não é possível reservar em datas passadas. Selecione uma data futura.');
                document.getElementById('dataReserva').value = '';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/horarios-disponiveis-espaco?data=${data}`);
                const ocupados = await response.json();
                const todosHorarios = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00'];
                
                // Filtra horários disponíveis
                let horarios = todosHorarios.filter(h => !ocupados.includes(h));
                
                // Se for hoje, remove horários que já passaram
                const isHoje = (data === dataHoje);
                if (isHoje) {
                    horarios = horarios.filter(horario => !isHorarioPassado(horario));
                }
                
                horariosDisponiveis = horarios;
                
                const selectInicio = document.getElementById('horarioInicio');
                if (horariosDisponiveis.length > 0) {
                    selectInicio.innerHTML = '<option value="">Selecione...</option>' + 
                        horariosDisponiveis.map(h => `<option value="${h}">${h}</option>`).join('');
                } else {
                    if (isHoje) {
                        selectInicio.innerHTML = '<option value="">Sem horários disponíveis para hoje (horários já passaram)</option>';
                    } else {
                        selectInicio.innerHTML = '<option value="">Sem horários disponíveis nesta data</option>';
                    }
                }
                
                document.getElementById('horarioFim').innerHTML = '<option value="">Será preenchido automaticamente</option>';
                document.getElementById('horarioFim').disabled = true;
                
            } catch (error) { console.error('Erro ao carregar horários:', error); }
        }
        
        document.getElementById('horarioInicio').addEventListener('change', function() {
            const inicio = this.value;
            if (inicio && selectedPreco) {
                calcularHorarioFimAutomatico();
            }
        });
        
        document.getElementById('dataReserva').addEventListener('change', carregarHorariosDisponiveis);
        
        document.getElementById('btnReservar').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const email = document.getElementById('email').value;
            const instagram = document.getElementById('instagram').value;
            const especialidade = document.getElementById('especialidade').value;
            const dataReserva = document.getElementById('dataReserva').value;
            const horarioInicio = document.getElementById('horarioInicio').value;
            const horarioFim = document.getElementById('horarioFim').value;
            const observacao = document.getElementById('observacao').value;
            
            if (!nome || !whatsapp || !dataReserva || !horarioInicio || !horarioFim || !selectedPreco) {
                alert('Preencha todos os campos obrigatórios');
                return;
            }
            
            // Validação final de data e horário
            const hoje = new Date();
            const anoHoje = hoje.getFullYear();
            const mesHoje = String(hoje.getMonth() + 1).padStart(2, '0');
            const diaHoje = String(hoje.getDate()).padStart(2, '0');
            const dataHoje = `${anoHoje}-${mesHoje}-${diaHoje}`;
            
            if (dataReserva < dataHoje) {
                alert('Não é possível reservar em datas passadas.');
                return;
            }
            
            if (dataReserva === dataHoje && isHorarioPassado(horarioInicio)) {
                alert('Não é possível reservar um horário que já passou.');
                return;
            }
            
            const reserva = { 
                nome, whatsapp, email, instagram, especialidade, 
                dataReserva, horarioInicio, horarioFim, 
                valor: selectedPreco.valorBase, 
                observacao,
                tipo: selectedPreco.tipo
            };
            
            try {
                const response = await fetch(`${API_URL}/reservar-espaco`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(reserva) 
                });
                const result = await response.json();
                if (result.success) {
                    alert('✅ Solicitação de reserva enviada! Entraremos em contato.');
                    window.location.href = 'index.html';
                } else { 
                    alert('❌ Erro: ' + (result.error || 'Tente novamente')); 
                }
            } catch (error) { 
                alert('❌ Erro ao conectar com o servidor'); 
            }
        });
        
        // Inicializar
        configurarDataMinima();
        carregarPrecos();
    </script>
</body>
</html>
