<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Reserva | Casa Nanquim</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        .navbar { background: #000; padding: 1rem 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.5rem; font-weight: 700; text-decoration: none; color: white; }
        .logo span { color: #ff8800; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-name { color: #ff8800; font-weight: 500; }
        .btn-sair { background: #ff4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card { background: #111; border-radius: 24px; padding: 40px; border: 1px solid #222; }
        .card h2 { margin-bottom: 30px; border-left: 4px solid #ff8800; padding-left: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff8800; }
        .precos { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .preco-card { background: #1a1a1a; padding: 15px; border-radius: 12px; flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .preco-card.selected { border-color: #ff8800; background: #222; }
        .preco-card h3 { color: #ff8800; }
        .preco-card p { font-size: 1.5rem; font-weight: bold; }
        .btn-submit { width: 100%; background: #ff8800; color: black; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background: #ffaa33; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-voltar { background: transparent; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .alert-error { background: #3b1f1f; border: 1px solid #ff4444; color: #ff8888; }
        .info-text { font-size: 12px; color: #888; margin-top: 5px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.ativo { display: flex; }
        .modal { background: #111; border: 1px solid #333; border-radius: 20px; padding: 36px; max-width: 460px; width: 100%; text-align: center; animation: popIn 0.22s ease; }
        @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icone { font-size: 3.2rem; margin-bottom: 14px; }
        .modal h3 { font-size: 1.3rem; margin-bottom: 10px; }
        .modal p { color: #bbb; line-height: 1.6; font-size: 0.95rem; margin-bottom: 8px; }
        .modal-pagamento { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px 20px; margin: 16px 0; text-align: left; }
        .modal-pagamento p { color: #ccc; font-size: 0.9rem; margin-bottom: 10px; }
        .modal-metodos { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
        .metodo { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px 18px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .metodo.pix    { border-color: #00c851; color: #00c851; }
        .metodo.debito { border-color: #33b5e5; color: #33b5e5; }
        .metodo.credito{ border-color: #ff8800; color: #ff8800; }
        .btn-modal-ok { background: #ff8800; color: black; border: none; padding: 12px 36px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 20px; width: 100%; }
        .btn-modal-ok:hover { background: #ffaa33; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">⚡ CASA <span>NANQUIM</span></a>
        <div class="user-info">
            <span class="user-name" id="userName"></span>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>📅 Solicitar Reserva de Espaço</h2>

            <div id="alertMessage"></div>

            <div class="form-group">
                <label>📅 Data da reserva</label>
                <input type="date" id="dataReserva" min="">
            </div>

            <div class="form-group">
                <label>⏰ Horário de início</label>
                <select id="horarioInicio">
                    <option value="">Selecione...</option>
                </select>
            </div>

            <div class="form-group">
                <label>⏰ Horário de fim</label>
                <select id="horarioFim" disabled>
                    <option value="">Será preenchido automaticamente</option>
                </select>
                <p class="info-text" id="infoHorarioFim"></p>
            </div>

            <h3 style="margin-bottom:15px;">💰 Escolha o período</h3>
            <div class="precos" id="precosContainer"></div>

            <div class="form-group">
                <label>💬 Observações (opcional)</label>
                <textarea id="observacao" rows="3" placeholder="Alguma informação adicional?"></textarea>
            </div>

            <div class="form-group">
                <label>💰 Valor total</label>
                <input type="text" id="valorTotal" readonly style="background:#333; font-size:1.2rem; font-weight:bold;">
            </div>

            <button class="btn-submit" id="btnReservar">📝 Solicitar Reserva</button>
            <button class="btn-voltar" onclick="window.location.href='dashboard-tatuador.html'">← Voltar ao Dashboard</button>
        </div>
    </div>

    <script>
        // ========== URL DINÂMICA - FUNCIONA EM QUALQUER MÁQUINA ==========
        var host = window.location.hostname;
        var porta = window.location.port;
        var API_URL = 'http://' + host + ':' + porta + '/CasaNanquim/api';

        var precos = [];
        var selectedPreco = null;
        var horariosConfigurados = [];
        var horariosOcupados = [];

        function verificarLogin() {
            var tatuadorId = localStorage.getItem('tatuadorId');
            var tatuadorNome = localStorage.getItem('tatuadorNome');
            if (!tatuadorId) { window.location.href = 'login-tatuador.html'; return false; }
            document.getElementById('userName').innerHTML = '<i class="fas fa-user"></i> ' + tatuadorNome;
            return true;
        }

        function configurarDataMinima() {
            var hoje = new Date();
            var ano = hoje.getFullYear();
            var mes = String(hoje.getMonth() + 1).padStart(2, '0');
            var dia = String(hoje.getDate()).padStart(2, '0');
            document.getElementById('dataReserva').min = ano + '-' + mes + '-' + dia;
        }

        function carregarPrecos() {
            fetch(API_URL + '/precos-espaco')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                precos = data;
                var html = precos.map(function(p) {
                    return '<div class="preco-card" data-id="' + p.id + '" data-valor="' + p.valor + '" data-periodo="' + p.periodo + '">' +
                        '<h3>' + (p.descricao || p.periodo) + '</h3>' +
                        '<p>R$ ' + p.valor.toFixed(2) + '</p>' +
                    '</div>';
                }).join('');
                document.getElementById('precosContainer').innerHTML = html;
                document.querySelectorAll('.preco-card').forEach(function(card) {
                    card.addEventListener('click', function() {
                        document.querySelectorAll('.preco-card').forEach(function(c) { c.classList.remove('selected'); });
                        card.classList.add('selected');
                        selectedPreco = { id: parseInt(card.dataset.id), valor: parseFloat(card.dataset.valor), periodo: card.dataset.periodo };
                        document.getElementById('valorTotal').value = 'R$ ' + selectedPreco.valor.toFixed(2);
                        calcularHorarioFim();
                    });
                });
            })
            .catch(function(e) { console.error('Erro ao carregar preços:', e); });
        }

        function carregarHorariosConfigurados() {
            return fetch(API_URL + '/configuracoes')
            .then(function(r) { return r.json(); })
            .then(function(config) {
                horariosConfigurados = config.horarios || [];
                if (horariosConfigurados.length === 0) {
                    horariosConfigurados = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
                }
                return horariosConfigurados;
            })
            .catch(function(e) {
                console.error('Erro ao carregar horários configurados:', e);
                horariosConfigurados = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
                return horariosConfigurados;
            });
        }

        function carregarHorariosOcupados(data) {
            return fetch(API_URL + '/horarios-disponiveis-espaco?data=' + data)
            .then(function(r) { return r.json(); })
            .then(function(ocupados) {
                horariosOcupados = ocupados;
                return horariosOcupados;
            })
            .catch(function(e) {
                console.error('Erro ao carregar horários ocupados:', e);
                horariosOcupados = [];
                return horariosOcupados;
            });
        }

        function atualizarSelectHorarios() {
            var data = document.getElementById('dataReserva').value;
            var horariosDisponiveis = horariosConfigurados.filter(function(h) {
                return !horariosOcupados.includes(h);
            });
            
            var hoje = new Date().toISOString().split('T')[0];
            var isHoje = (data === hoje);
            if (isHoje) {
                var horaAtual = new Date().getHours();
                var minutoAtual = new Date().getMinutes();
                horariosDisponiveis = horariosDisponiveis.filter(function(horario) {
                    var partes = horario.split(':');
                    var hora = parseInt(partes[0]);
                    var minuto = parseInt(partes[1]);
                    if (hora > horaAtual) return true;
                    if (hora === horaAtual && minuto > minutoAtual) return true;
                    return false;
                });
            }
            
            var sel = document.getElementById('horarioInicio');
            if (horariosDisponiveis.length > 0) {
                sel.innerHTML = '<option value="">Selecione...</option>' +
                    horariosDisponiveis.map(function(h) { return '<option value="' + h + '">' + h + '</option>'; }).join('');
            } else {
                sel.innerHTML = '<option value="">Sem horários disponíveis nesta data</option>';
            }
            document.getElementById('horarioFim').innerHTML = '<option value="">Será preenchido automaticamente</option>';
            document.getElementById('horarioFim').disabled = true;
            document.getElementById('infoHorarioFim').textContent = '';
        }

        function carregarHorarios() {
            var data = document.getElementById('dataReserva').value;
            if (!data) return;
            
            carregarHorariosConfigurados()
            .then(function() {
                return carregarHorariosOcupados(data);
            })
            .then(function() {
                atualizarSelectHorarios();
            });
        }

        function calcularHorarioFim() {
            var inicio = document.getElementById('horarioInicio').value;
            if (!inicio || !selectedPreco) return;
            var duracao = 0;
            if (selectedPreco.periodo === '2_HORAS') duracao = 2;
            else if (selectedPreco.periodo === 'MEIO_PERIODO') duracao = 4;
            else if (selectedPreco.periodo === 'DIA_INTEIRO') duracao = 8;
            else return;
            var partes = inicio.split(':');
            var horaFim = parseInt(partes[0]) + duracao;
            if (horaFim > 20) {
                alert('Este horário ultrapassa o limite de funcionamento (20:00). Escolha um horário mais cedo.');
                document.getElementById('horarioInicio').value = '';
                return;
            }
            var fimStr = String(horaFim).padStart(2, '0') + ':' + partes[1];
            
            var horariosDisponiveis = horariosConfigurados.filter(function(h) {
                return !horariosOcupados.includes(h);
            });
            if (!horariosDisponiveis.includes(fimStr)) {
                alert('O horário de fim (' + fimStr + ') não está disponível. Escolha outro horário de início.');
                document.getElementById('horarioInicio').value = '';
                return;
            }
            
            var sel = document.getElementById('horarioFim');
            sel.innerHTML = '<option value="' + fimStr + '">' + fimStr + '</option>';
            sel.disabled = false;
            sel.value = fimStr;
            document.getElementById('infoHorarioFim').textContent = 'Horário de fim calculado automaticamente (+' + duracao + 'h)';
        }

        function showAlertError(msg) {
            document.getElementById('alertMessage').innerHTML = '<div class="alert alert-error">' + msg + '</div>';
            setTimeout(function() {
                document.getElementById('alertMessage').innerHTML = '';
            }, 5000);
        }

        document.getElementById('dataReserva').addEventListener('change', carregarHorarios);
        document.getElementById('horarioInicio').addEventListener('change', calcularHorarioFim);

        document.getElementById('btnReservar').addEventListener('click', function() {
            var data = document.getElementById('dataReserva').value;
            var inicio = document.getElementById('horarioInicio').value;
            var fim = document.getElementById('horarioFim').value;
            var observ = document.getElementById('observacao').value;
            var btn = document.getElementById('btnReservar');

            if (!data || !inicio || !fim || !selectedPreco) {
                showAlertError('❌ Preencha todos os campos obrigatórios!');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enviando...';

            fetch(API_URL + '/solicitar-reserva', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    dataSolicitacao: data,
                    horarioInicio: inicio,
                    horarioFim: fim,
                    periodoEscolhido: selectedPreco.periodo,
                    valor: selectedPreco.valor,
                    observacao: observ
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(result) {
                if (result.success) {
                    document.getElementById('modalSucesso').classList.add('ativo');
                } else {
                    showAlertError('❌ ' + (result.error || 'Erro ao solicitar reserva'));
                    btn.disabled = false;
                    btn.textContent = '📝 Solicitar Reserva';
                }
            })
            .catch(function(error) {
                console.error('Erro:', error);
                showAlertError('❌ Erro ao conectar com o servidor. Verifique se o Tomcat está rodando.');
                btn.disabled = false;
                btn.textContent = '📝 Solicitar Reserva';
            });
        });

        function logout() {
            localStorage.removeItem('tatuadorId');
            localStorage.removeItem('tatuadorNome');
            window.location.href = 'index.html';
        }

        if (verificarLogin()) {
            configurarDataMinima();
            carregarPrecos();
        }
    </script>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalSucesso">
        <div class="modal">
            <div class="modal-icone">🎉</div>
            <h3>Reserva solicitada com sucesso!</h3>
            <p>Sua solicitação foi enviada e está <strong>aguardando confirmação</strong> do estúdio.</p>
            <div class="modal-pagamento">
                <p><i class="fas fa-info-circle" style="color:#ff8800; margin-right:6px;"></i>
                    <strong style="color:#fff;">O pagamento é feito no dia, presencialmente.</strong>
                </p>
                <div class="modal-metodos">
                    <span class="metodo pix"><i class="fas fa-qrcode"></i> Pix</span>
                    <span class="metodo debito"><i class="fas fa-credit-card"></i> Débito</span>
                    <span class="metodo credito"><i class="fas fa-credit-card"></i> Crédito</span>
                </div>
            </div>
            <button class="btn-modal-ok" onclick="window.location.href='dashboard-tatuador.html'">Entendido, ir para o dashboard ✓</button>
        </div>
    </div>

</body>
</html>
