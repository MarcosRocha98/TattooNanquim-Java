<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Casa Nanquim</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { max-width: 450px; width: 100%; margin: 20px; }
        .login-card { background: #111; border-radius: 24px; padding: 40px; border: 1px solid #222; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 1.8rem; }
        .logo span { color: #ff8800; }
        .logo p { color: #888; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #ff8800; }
        .btn-login { width: 100%; background: #ff8800; color: black; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-login:hover { background: #ffaa33; }
        .error-message { background: #3b1f1f; border: 1px solid #ff4444; color: #ff8888; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #888; text-decoration: none; }
        .back-link a:hover { color: #ff8800; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>CASA <span>NANQUIM</span></h1>
                <p>Área Administrativa</p>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="usuario" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <div class="back-link"><a href="index.html">← Voltar para o site</a></div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            if (usuario === 'admin' && senha === 'admin') {
                localStorage.setItem('adminLogado', 'true');
                window.location.href = 'admin.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Usuário ou senha inválidos!';
            }
        });
    </script>
</body>
</html>
